<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beats | luvbesly</title>
    
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Orbitron:wght@800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- MENÚ DE NAVEGACIÓN -->
    <header>
        <div class="logo">BESLY</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="videos.html">Videos</a></li>
                <li><a href="beats.html" class="active">Beats</a></li>
                <li><a href="kits.html">Sound Kits</a></li>
            </ul>
        </nav>
    </header>

    <!-- SECCIÓN DE LA TIENDA INTEGRADA -->
    <main class="beats-container">
        <div class="beats-header">
            <h2>BEAT CATALOG</h2>
            <p>Instant delivery</p>
        </div>

        <!-- FILTROS POR GÉNERO -->
        <div class="genre-filters">
            <button class="filter-btn active">ALL</button>
            <button class="filter-btn">DARK TRAP</button>
            <button class="filter-btn">DRILL</button>
            <button class="filter-btn">PHONK</button>
            <button class="filter-btn">BOOM BAP</button>
        </div>

        <!-- LISTA NATIVA DE BEATS -->
        <div class="beats-list">
            
            <!-- FILA BEAT 1 -->
            <div class="beat-row">
                <div class="beat-main">
                    <button class="play-btn">▶</button>
                    <div class="beat-details">
                        <h3>DARKNESS</h3>
                        <span class="beat-bpm">140 BPM</span>
                        <span class="beat-tag">#DarkTrap</span>
                    </div>
                </div>
                <div class="beat-actions">
                    <span class="beat-price">$29.95</span>
                    <button class="buy-btn">ADD TO CART</button>
                </div>
            </div>

            <!-- FILA BEAT 2 -->
            <div class="beat-row">
                <div class="beat-main">
                    <button class="play-btn">▶</button>
                    <div class="beat-details">
                        <h3>EMPIRE</h3>
                        <span class="beat-bpm">144 BPM</span>
                        <span class="beat-tag">#Drill</span>
                    </div>
                </div>
                <div class="beat-actions">
                    <span class="beat-price">$29.95</span>
                    <button class="buy-btn">ADD TO CART</button>
                </div>
            </div>

            <!-- FILA BEAT 3 -->
            <div class="beat-row">
                <div class="beat-main">
                    <button class="play-btn">▶</button>
                    <div class="beat-details">
                        <h3>TOXIC AUDIO</h3>
                        <span class="beat-bpm">130 BPM</span>
                        <span class="beat-tag">#Phonk</span>
                    </div>
                </div>
                <div class="beat-actions">
                    <span class="beat-price">$34.95</span>
                    <button class="buy-btn">ADD TO CART</button>
                </div>
            </div>

        </div>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer>
        <p>&copy; 2026 LUVBESLY. All Rights Reserved.</p>
    </footer>

</body>
</html>
